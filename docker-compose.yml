services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                       # all secrets live here
    environment:
      ALLOW_ORIGINS: "http://[IP_ADDRESS]"
    volumes:
      - uploads_data:/app/backend/docs/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://[IP_ADDRESS]/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time
        NEXT_PUBLIC_API_URL: http://[IP_ADDRESS]
        NEXT_PUBLIC_MOCK_MODE: "false"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  uploads_data:
