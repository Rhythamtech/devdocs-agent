services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://0.0.0.0:8000
      - NEXT_PUBLIC_MOCK_MODE=false
    extra_hosts:
      - "storage-mongodb-bugx36-de46ce-88-214-23-153.sslip.io:88.214.23.153"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

