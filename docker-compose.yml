services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Rewrites in next.config.ts proxy API calls server-side (localhost:8000),
        # so the browser never calls the backend directly.
        # Leave blank — the Next.js rewrites handle routing internally.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_MOCK_MODE: "false"
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Runtime env-vars for the backend process
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_MOCK_MODE=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
